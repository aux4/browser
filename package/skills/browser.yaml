skills:
  - expression: "go to {url}"
    execute: "aux4 browser visit --session {{session}} --url ${url}"
  - expression: "visit {url}"
    execute: "aux4 browser visit --session {{session}} --url ${url}"
  - expression: "click on {name} button"
    execute: "aux4 browser click --session {{session}} --name ${name}"
  - expression: "click on {name} link"
    execute: "aux4 browser click --session {{session}} --name ${name} --role link"
  - expression: "click on {name}"
    execute: "aux4 browser click --session {{session}} --name ${name}"
  - expression: "click on text {text}"
    execute: "aux4 browser click-text --session {{session}} --text ${text}"
  - expression: "click on {selector} element"
    execute: "aux4 browser click-selector --session {{session}} --selector ${selector}"
  - expression: "type {value} in {name} field"
    execute: "aux4 browser type --session {{session}} --name ${name} --value ${value}"
  - expression: "type {value} in {name}"
    execute: "aux4 browser type --session {{session}} --name ${name} --value ${value}"
  - expression: "select {value} from {name} dropdown"
    execute: "aux4 browser select --session {{session}} --name ${name} --value ${value}"
  - expression: "select {value} from {name}"
    execute: "aux4 browser select --session {{session}} --name ${name} --value ${value}"
  - expression: "check {name} checkbox"
    execute: "aux4 browser check --session {{session}} --name ${name}"
  - expression: "check {name}"
    execute: "aux4 browser check --session {{session}} --name ${name}"
  - expression: "uncheck {name} checkbox"
    execute: "aux4 browser uncheck --session {{session}} --name ${name}"
  - expression: "uncheck {name}"
    execute: "aux4 browser uncheck --session {{session}} --name ${name}"
  - expression: "hover over {name} button"
    execute: "aux4 browser hover --session {{session}} --name ${name}"
  - expression: "hover over {name} link"
    execute: "aux4 browser hover --session {{session}} --name ${name} --role link"
  - expression: "hover over {name}"
    execute: "aux4 browser hover --session {{session}} --name ${name}"
  - expression: "press {key} key"
    execute: "aux4 browser press --session {{session}} --key ${key}"
  - expression: "press {key}"
    execute: "aux4 browser press --session {{session}} --key ${key}"
  - expression: "clear {name} field"
    execute: "aux4 browser clear --session {{session}} --name ${name}"
  - expression: "clear {name}"
    execute: "aux4 browser clear --session {{session}} --name ${name}"
  - expression: "upload {file} to {name}"
    execute: "aux4 browser upload --session {{session}} --name ${name} --file ${file}"
  - expression: "wait for {selector} for {timeout} seconds"
    execute: "aux4 browser wait --session {{session}} --selector ${selector} --timeout ${timeout}000"
    params:
      timeout: \d+
  - expression: "wait for {selector}"
    execute: "aux4 browser wait --session {{session}} --selector ${selector}"
  - expression: "take screenshot {filename}"
    execute: "aux4 browser screenshot --session {{session}} --output ${filename}"
  - expression: "screenshot {filename}"
    execute: "aux4 browser screenshot --session {{session}} --output ${filename}"
  - expression: "get content"
    execute: "aux4 browser content --session {{session}}"
  - expression: "get content as {format}"
    execute: "aux4 browser content --session {{session}} --format ${format}"
  - expression: "get content of {selector}"
    execute: "aux4 browser content --session {{session}} --selector ${selector}"
  - expression: "get text of {selector}"
    execute: "aux4 browser content --session {{session}} --selector ${selector} --format text"
  - expression: "expect {selector} to have text {text}( within {timeout} seconds)?"
    execute: "aux4 browser expect --session {{session}} --selector ${selector} --assertion have_text --expected ${text} --timeout ${timeout}000"
    params:
      timeout: \d+
  - expression: "expect {selector} to be visible"
    execute: "aux4 browser expect --session {{session}} --selector ${selector} --assertion be_visible"
  - expression: "expect {selector} to exist"
    execute: "aux4 browser expect --session {{session}} --selector ${selector} --assertion exist"
  - expression: "expect {selector} to not exist"
    execute: "aux4 browser expect --session {{session}} --selector ${selector} --assertion not_exist"
  - expression: "expect {selector} to have attribute {attribute}"
    execute: "aux4 browser expect --session {{session}} --selector ${selector} --assertion have_attribute --expected ${attribute}"
  - expression: "expect {selector} to have count {count}"
    execute: "aux4 browser expect --session {{session}} --selector ${selector} --assertion have_count --expected ${count}"
    params:
      count: \d+
  - expression: "expect {selector} to have at least {count}"
    execute: "aux4 browser expect --session {{session}} --selector ${selector} --assertion have_count_at_least --expected ${count}"
    params:
      count: \d+
  - expression: "expect url to contain {url}"
    execute: "aux4 browser expect --session {{session}} --selector body --assertion have_url --expected ${url}"
  - expression: "expect title to contain {title}"
    execute: "aux4 browser expect --session {{session}} --selector body --assertion have_title --expected ${title}"
  - expression: "scroll down"
    execute: "aux4 browser scroll --session {{session}} --direction down"
  - expression: "scroll up"
    execute: "aux4 browser scroll --session {{session}} --direction up"
  - expression: "scroll to the top"
    execute: "aux4 browser scroll --session {{session}} --direction top"
  - expression: "scroll to the bottom"
    execute: "aux4 browser scroll --session {{session}} --direction bottom"
  - expression: "go back"
    execute: "aux4 browser back --session {{session}}"
  - expression: "go forward"
    execute: "aux4 browser forward --session {{session}}"
  - expression: "within {selector} do\n{script}\nend within"
    execute: "aux4 browser set-scope --session {{session}} --selector ${selector}"
    eval: script
    after: "aux4 browser clear-scope --session {{session}}"
  - expression: "scope {selector}"
    execute: "aux4 browser set-scope --session {{session}} --selector ${selector}"
  - expression: "unscope"
    execute: "aux4 browser clear-scope --session {{session}}"
  - expression: "reload the page"
    execute: "aux4 browser reload --session {{session}}"
  - expression: "reload"
    execute: "aux4 browser reload --session {{session}}"
  - expression: "expect list to have at least {count} items"
    execute: "aux4 browser expect-list --session {{session}} --assertion at_least --expected ${count}"
    params:
      count: \d+
  - expression: "expect list {selector} to have at least {count} items"
    execute: "aux4 browser expect-list --session {{session}} --assertion at_least --expected ${count} --selector ${selector}"
    params:
      count: \d+
  - expression: "expect list to contain {text}"
    execute: "aux4 browser expect-list --session {{session}} --assertion contains --expected ${text}"
  - expression: "expect list {selector} to contain {text}"
    execute: "aux4 browser expect-list --session {{session}} --assertion contains --expected ${text} --selector ${selector}"
  - expression: "click on list item {item}"
    execute: "aux4 browser click-item --session {{session}} --item ${item}"
  - expression: "click on list item {item} in {selector}"
    execute: "aux4 browser click-item --session {{session}} --item ${item} --selector ${selector}"
  - expression: "get list items"
    execute: "aux4 browser get-items --session {{session}}"
  - expression: "get list {selector} items"
    execute: "aux4 browser get-items --session {{session}} --selector ${selector}"
  - expression: "evaluate {script}"
    execute: "aux4 browser eval --session {{session}} --script ${script}"
  - expression: "sleep {seconds} seconds"
    execute: "sleep ${seconds}"
    params:
      seconds: \d+
  - expression: "sleep {seconds} second"
    execute: "sleep ${seconds}"
    params:
      seconds: \d+
